model:
  name: "MyClassifier"
  version: "1.0"
  parameters:
    learning_rate: 0.001
    batch_size: 32
    epochs: 10

data:
  s3:
    bucket: "coop-published-zone-298305347319"
    comments_path: "arcticshift_reddit/comments/"
    posts_path: "arcticshift_reddit/posts/"
    file_format: "parquet"
    partitioning:
      year: true
      month: true
  chunking:
    files_per_chunk: 10
    rows_per_chunk: 25000

logging:
  level: "INFO"
  log_file: "logs/classifier.log"